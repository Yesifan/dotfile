# Core behavior.
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -sg escape-time 10

# Terminal capabilities.
set -g default-terminal "tmux-256color"
set -g focus-events on
set -g xterm-keys on
set -g extended-keys on
set -g extended-keys-format csi-u

set -g terminal-features 'xterm*:clipboard:ccolour:cstyle:focus:title,screen*:title,rxvt*:ignorefkeys,xterm-ghostty:RGB:clipboard:extkeys,tmux-256color:RGB:clipboard:extkeys,screen-256color:RGB:clipboard'

# Clipboard over SSH/Ghostty via OSC 52.
set -s set-clipboard on
set -g allow-passthrough on
set -g terminal-overrides 'linux*:AX@,xterm-ghostty:Ms=\E]52;%p1%s;%p2%s\007,tmux-256color:Ms=\E]52;%p1%s;%p2%s\007,screen-256color:Ms=\E]52;%p1%s;%p2%s\007'

# Copy mode.
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Bindings.
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
