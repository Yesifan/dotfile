model = "gpt-5.6-terra"
model_reasoning_effort = "medium"
personality = "pragmatic"

approval_policy = "on-request"
default_permissions = "development"

[tui]
status_line = [
  "model-with-reasoning",
  "current-dir",
  "permissions",
  "context-used",
  "weekly-limit",
  "total-input-tokens",
  "total-output-tokens",
]
status_line_use_colors = true

[features.network_proxy]
enabled = true

[features.multi_agent_v2]
enabled = true
max_concurrent_threads_per_session = 4
multi_agent_mode_hint_text = """
Use a sub - agent to execute the task when the intermediate execution 
steps of the task have no persistent value and only the final result matters.

Use the waiter agent to execute commands/scripts that may take a long time to run.

Prefer to use fork_turns = "none" to save tokens.
"""

[agents]
max_depth = 1

[permissions.development]
description = "Normal local development with workspace write access, pnpm global access, and limited network."
extends = ":workspace"

[permissions.development.filesystem]
glob_scan_max_depth = 8

"~/.npm" = "write"
"~/.nvm/versions/node" = "read"
"~/Library/pnpm" = "write"
"~/Library/Caches/pnpm" = "write"

"~/.local/share/opencode" = "write"
"~/.local/share/pnpm/store" = "write"
"~/.cache/ms-playwright" = "write"
"~/.cache/puppeteer" = "write"
"~/.cache/Cypress" = "write"
"~/.cache/uv" = "write"

[permissions.development.filesystem.":workspace_roots"]
"." = "write"
"*.pem" = "deny"
"**/*.pem" = "deny"

"*.key" = "deny"
"**/*.key" = "deny"

[permissions.development.network]
enabled = true
mode = "full"
allow_local_binding = true

[permissions.development.network.domains]
"localhost" = "allow"
"127.0.0.1" = "allow"
"::1" = "allow"

"registry.npmjs.org" = "allow"

"github.com" = "allow"
"api.github.com" = "allow"
"codeload.github.com" = "allow"
"**.githubusercontent.com" = "allow"

"nodejs.org" = "allow"
"**.nodejs.org" = "allow"

"**.opencode.ai" = "allow"

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"
enabled = true

[mcp_servers.context7.http_headers]
CONTEXT7_API_KEY = "{env:CONTEXT7_API_KEY}"

[mcp_servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]

[mcp_servers.github.env]
GITHUB_PERSONAL_ACCESS_TOKEN = "{env:GITHUB_PERSONAL_ACCESS_TOKEN}"

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]
